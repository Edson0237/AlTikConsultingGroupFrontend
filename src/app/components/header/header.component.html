<header class="header">
  <div class="header__inner">

    <!-- Search Bar -->
    <div class="header__search">
      <svg class="header__search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        class="header__search-input"
        [placeholder]="'HEADER.SEARCH_PLACEHOLDER' | translate"
        [(ngModel)]="searchQuery"
        [attr.aria-label]="'HEADER.SEARCH_PLACEHOLDER' | translate"
      />
    </div>

    <!-- Right actions -->
    <div class="header__actions">

      <!-- Language switcher -->
      <div class="header__lang-wrap">
        <button
          class="header__lang-btn"
          (click)="toggleLangMenu()"
          [attr.aria-label]="('HEADER.LANGUAGE' | translate) + ': ' + currentLang"
          [attr.aria-expanded]="showLangMenu"
          aria-haspopup="true"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span class="header__lang-label">{{ currentLang }}</span>
        </button>

        <!-- Backdrop (ferme le menu si on clique ailleurs) -->
        <div class="header__backdrop" *ngIf="showLangMenu" (click)="closeLangMenu()" aria-hidden="true"></div>

        <!-- Menu des 3 langues -->
        <div class="header__lang-menu" *ngIf="showLangMenu" role="menu">
          <button
            *ngFor="let opt of languageOptions"
            class="header__lang-option"
            [class.header__lang-option--active]="isActiveLang(opt.code)"
            role="menuitemradio"
            [attr.aria-checked]="isActiveLang(opt.code)"
            (click)="selectLanguage(opt.code)"
          >
            <span>{{ opt.label }}</span>
            <svg *ngIf="isActiveLang(opt.code)" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Notifications -->
      <button class="header__notif-btn" (click)="toggleNotifications()" [attr.aria-label]="'HEADER.NOTIFICATIONS' | translate">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" aria-hidden="true">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="header__notif-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
      </button>

      <!-- User menu -->
      <div class="header__user-wrap">
        <button
          class="header__user-btn"
          (click)="toggleUserMenu()"
          [attr.aria-expanded]="showUserMenu"
          aria-haspopup="true"
          aria-label="{{ 'HEADER.USER_MENU' | translate }}"
        >
          <!-- Avatar initiales -->
          <div class="header__avatar">{{ userInitials }}</div>

          <!-- Infos utilisateur (nom + rôle) -->
          <div class="header__user-info">
            <span class="header__user-name">{{ userFullName }}</span>
            <span class="header__user-role" [ngClass]="roleClass">
              {{ userRole | titlecase }}
            </span>
          </div>

          <!-- Chevron -->
          <svg class="header__chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
            [class.header__chevron--open]="showUserMenu">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>

        <!-- Backdrop -->
        <div
          class="header__backdrop"
          *ngIf="showUserMenu"
          (click)="closeUserMenu()"
          aria-hidden="true"
        ></div>

        <!-- Dropdown -->
        <div class="header__dropdown" *ngIf="showUserMenu" role="menu">

          <!-- User info détaillée -->
          <div class="header__dropdown-info">
            <div class="header__dropdown-avatar">{{ userInitials }}</div>
            <div>
              <p class="header__dropdown-name">{{ userFullName }}</p>
              <p class="header__dropdown-email">{{ userEmail }}</p>
              <span class="header__dropdown-role" [ngClass]="'header__dropdown-role--' + (userRole)">
                {{ userRole | titlecase }}
              </span>
            </div>
          </div>

          <!-- Actions -->
          <div class="header__dropdown-actions">
            <button class="header__dropdown-item" role="menuitem"
              (click)="goToProfile()">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" aria-hidden="true">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              {{ 'HEADER.MY_PROFILE' | translate }}
            </button>
            <button class="header__dropdown-item header__dropdown-item--danger" role="menuitem"
              (click)="handleLogout()">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" aria-hidden="true">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              {{ 'HEADER.LOGOUT' | translate }}
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>
</header>
